<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTM.ia</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --ia-purple: #b06be8;
      --ia-purple-dim: rgba(176,107,232,0.12);
      --green: #6be8a8;
      --red: #e86b6b;
      --mono: 'DM Mono', monospace;
    }

    /* ── Layout ─────────────────────────────── */
    body { overflow: hidden; height: 100vh; }

    .ia-shell {
      position: relative; z-index: 5;
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ────────────────────────────── */
    .ia-topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      gap: 1rem;
    }

    .ia-topbar-left { display: flex; align-items: center; gap: 1rem; }

    .back-link {
      color: #7a7870; font-size: .8rem; text-decoration: none;
      letter-spacing: .04em; transition: color .2s; white-space: nowrap;
    }
    .back-link:hover { color: #fff; }

    .ia-brand {
      display: flex; align-items: center; gap: .5rem;
    }

    .ia-brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ia-purple);
      box-shadow: 0 0 8px var(--ia-purple);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .6; transform: scale(.85); }
    }

    .ia-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 600;
      color: #e8e6e0; letter-spacing: .02em;
    }
    .ia-brand-name span { color: var(--ia-purple); }

    .ia-topbar-right {
      display: flex; align-items: center; gap: .75rem;
    }

    .ia-status {
      font-size: .68rem; color: var(--green);
      letter-spacing: .12em; text-transform: uppercase;
      display: flex; align-items: center; gap: .35rem;
    }
    .ia-status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); display: block;
    }

    .clear-btn {
      background: transparent; border: 1px solid rgba(255,255,255,.08);
      color: #7a7870; font-family: 'DM Sans', sans-serif;
      font-size: .72rem; padding: .3rem .7rem; border-radius: 5px;
      cursor: pointer; transition: all .2s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Sidebar — notas ────────────────────── */
    .ia-sidebar {
      border-right: 1px solid rgba(255,255,255,.06);
      background: #050505;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: .85rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: space-between;
    }

    .sidebar-title {
      font-size: .65rem; letter-spacing: .18em;
      text-transform: uppercase; color: #4a4840; font-weight: 600;
    }

    .new-note-btn {
      background: var(--ia-purple-dim); border: 1px solid rgba(176,107,232,.3);
      color: var(--ia-purple); font-size: .72rem; padding: .2rem .55rem;
      border-radius: 5px; cursor: pointer; transition: all .2s;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
    }
    .new-note-btn:hover { background: rgba(176,107,232,.2); }

    .notes-list {
      flex: 1; overflow-y: auto; padding: .5rem;
    }
    .notes-list::-webkit-scrollbar { width: 3px; }
    .notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px; }

    .note-item {
      padding: .65rem .75rem; border-radius: 8px;
      cursor: pointer; transition: background .2s;
      margin-bottom: .25rem;
      border: 1px solid transparent;
    }
    .note-item:hover { background: rgba(255,255,255,.03); }
    .note-item.active { background: var(--ia-purple-dim); border-color: rgba(176,107,232,.2); }

    .note-item-title {
      font-size: .8rem; color: #e8e6e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500;
    }
    .note-item.active .note-item-title { color: var(--ia-purple); }

    .note-item-date {
      font-size: .65rem; color: #4a4840;
      font-family: 'DM Mono', monospace; margin-top: .15rem;
    }

    .note-empty {
      text-align: center; padding: 2rem 1rem;
      font-size: .78rem; color: #3a3830; line-height: 1.6;
    }

    /* ── Main area ──────────────────────────── */
    .ia-main {
      display: grid;
      grid-template-columns: 1fr 340px;
      overflow: hidden;
    }

    /* ── Notebook (editor) ──────────────────── */
    .ia-notebook {
      display: flex; flex-direction: column; overflow: hidden;
      border-right: 1px solid rgba(255,255,255,.06);
    }

    .notebook-toolbar {
      padding: .7rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; gap: .5rem;
      flex-wrap: wrap;
      background: rgba(255,255,255,.01);
    }

    .nb-title-input {
      flex: 1; min-width: 120px;
      background: transparent; border: none;
      color: #e8e6e0; font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600;
      outline: none;
    }
    .nb-title-input::placeholder { color: #3a3830; }

    .nb-tag {
      background: rgba(176,107,232,.1); border: 1px solid rgba(176,107,232,.2);
      color: var(--ia-purple); font-size: .65rem; padding: .2rem .5rem;
      border-radius: 4px; cursor: pointer; transition: all .2s;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .nb-tag:hover, .nb-tag.active { background: rgba(176,107,232,.2); }

    .save-btn {
      background: var(--ia-purple); color: #fff;
      border: none; padding: .3rem .85rem; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: .72rem;
      font-weight: 700; cursor: pointer; transition: opacity .2s;
      letter-spacing: .04em;
    }
    .save-btn:hover { opacity: .85; }
    .save-btn.saved { background: var(--green); color: #000; }

    .del-note-btn {
      background: transparent; border: 1px solid rgba(232,107,107,.2);
      color: var(--red); font-size: .68rem; padding: .25rem .6rem;
      border-radius: 5px; cursor: pointer; transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .del-note-btn:hover { background: rgba(232,107,107,.1); }

    .notebook-editor {
      flex: 1; padding: 1.5rem;
      overflow-y: auto;
    }
    .notebook-editor::-webkit-scrollbar { width: 4px; }
    .notebook-editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px; }

    #note-content {
      width: 100%; height: 100%;
      background: transparent; border: none; outline: none;
      color: #d8d6d0; font-family: 'DM Sans', sans-serif;
      font-size: .9rem; line-height: 1.8; resize: none;
    }
    #note-content::placeholder { color: #2a2820; }

    /* ── Chat (CTM.ia) ──────────────────────── */
    .ia-chat {
      display: flex; flex-direction: column; overflow: hidden;
      background: #030303;
    }

    .chat-header {
      padding: .7rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: .65rem; color: #4a4840;
      letter-spacing: .15em; text-transform: uppercase;
      display: flex; align-items: center; gap: .4rem;
    }
    .chat-header::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--ia-purple); display: block;
    }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px; }

    .msg {
      display: flex; gap: .6rem; align-items: flex-start;
      animation: fadeUp .25s ease;
    }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; flex-shrink: 0;
      margin-top: .1rem;
    }
    .msg-ia .msg-avatar   { background: var(--ia-purple-dim); color: var(--ia-purple); border: 1px solid rgba(176,107,232,.3); }
    .msg-user .msg-avatar { background: rgba(255,255,255,.05); color: #7a7870; border: 1px solid rgba(255,255,255,.08); }

    .msg-bubble {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 0 10px 10px 10px;
      padding: .65rem .85rem;
      font-size: .82rem; line-height: 1.65;
      color: #d8d6d0; max-width: 100%;
      word-break: break-word;
    }
    .msg-ia .msg-bubble   { border-color: rgba(176,107,232,.15); background: rgba(176,107,232,.04); }
    .msg-user .msg-bubble { border-radius: 10px 0 10px 10px; }

    .msg-bubble strong { color: var(--ia-purple); }
    .msg-bubble em     { color: #9ee8c5; font-style: normal; font-weight: 500; }
    .msg-bubble code   { font-family: 'DM Mono', monospace; font-size: .75rem; background: rgba(255,255,255,.06); padding: .1rem .3rem; border-radius: 3px; color: #e8d46b; }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: .3rem 0;
    }
    .typing-indicator span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--ia-purple); opacity: .4;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0); opacity: .4; }
      40%          { transform: translateY(-5px); opacity: 1; }
    }

    .chat-input-area {
      padding: .75rem;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex; gap: .5rem; align-items: flex-end;
    }

    #chat-input {
      flex: 1; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; color: #e8e6e0;
      font-family: 'DM Sans', sans-serif; font-size: .82rem;
      padding: .55rem .8rem; outline: none; resize: none;
      line-height: 1.5; max-height: 100px; overflow-y: auto;
      transition: border-color .2s;
    }
    #chat-input:focus  { border-color: rgba(176,107,232,.4); }
    #chat-input::placeholder { color: #3a3830; }

    .send-btn {
      background: var(--ia-purple); border: none;
      color: #fff; width: 34px; height: 34px;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: opacity .2s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .35; cursor: default; }

    /* Quick prompts */
    .quick-prompts {
      padding: .5rem .75rem 0;
      display: flex; flex-wrap: wrap; gap: .35rem;
    }
    .qp-btn {
      background: rgba(176,107,232,.07); border: 1px solid rgba(176,107,232,.15);
      color: #9a7ab0; font-size: .65rem; padding: .2rem .55rem;
      border-radius: 4px; cursor: pointer; transition: all .2s;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }
    .qp-btn:hover { background: rgba(176,107,232,.15); color: var(--ia-purple); }

    /* Mobile */
    @media (max-width: 900px) {
      .ia-shell { grid-template-columns: 1fr; }
      .ia-sidebar { display: none; }
      .ia-main { grid-template-columns: 1fr; grid-template-rows: 1fr 300px; }
      body { overflow: auto; }
      .ia-shell { height: auto; min-height: 100vh; }
      .ia-chat { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="ia-shell">

    <!-- ── Top bar ───────────────────────────── -->
    <header class="ia-topbar">
      <div class="ia-topbar-left">
        <a href="preguntas.html" class="back-link">← Volver</a>
        <div class="ia-brand">
          <div class="ia-brand-dot"></div>
          <span class="ia-brand-name">CTM<span>.ia</span></span>
        </div>
      </div>
      <div class="ia-topbar-right">
        <span class="ia-status">Online</span>
        <button class="clear-btn" onclick="clearChat()">Limpiar chat</button>
      </div>
    </header>

    <!-- ── Sidebar — Notas ────────────────────── -->
    <aside class="ia-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Mis cuadernos</span>
        <button class="new-note-btn" onclick="newNote()">+ Nueva</button>
      </div>
      <div class="notes-list" id="notes-list">
        <p class="note-empty">Crea tu primera nota<br/>con "+ Nueva"</p>
      </div>
    </aside>

    <!-- ── Main ──────────────────────────────── -->
    <main class="ia-main">

      <!-- Notebook editor -->
      <section class="ia-notebook">
        <div class="notebook-toolbar">
          <input type="text" id="note-title" class="nb-title-input" placeholder="Título de la nota..." />
          <button class="nb-tag" onclick="insertTag('Mate')">Mate</button>
          <button class="nb-tag" onclick="insertTag('Biología')">Bio</button>
          <button class="nb-tag" onclick="insertTag('Inglés')">Inglés</button>
          <button class="nb-tag" onclick="insertTag('TOK')">TOK</button>
          <button class="nb-tag" onclick="askIaAboutNote()"> Explicar</button>
          <button class="save-btn" id="save-btn" onclick="saveNote()">Guardar</button>
          <button class="del-note-btn" onclick="deleteNote()">Eliminar</button>
        </div>
        <div class="notebook-editor">
          <textarea id="note-content" placeholder="Escribe tus notas aquí...&#10;&#10;Tips:&#10;- Pulsa 'Explicar' para que CTM.ia analice tu nota&#10;- Usa los tags de materia para organizar&#10;- Se guarda en tu navegador automáticamente"></textarea>
        </div>
      </section>

      <!-- Chat CTM.ia -->
      <section class="ia-chat">
        <div class="chat-header">CTM.ia — Asistente IB</div>

        <div class="quick-prompts" id="quick-prompts">
          <button class="qp-btn" onclick="quickPrompt('¿Qué es el TOK en el IB?')">TOK</button>
          <button class="qp-btn" onclick="quickPrompt('Tips para la IA de Biología')">IA Bio</button>
          <button class="qp-btn" onclick="quickPrompt('¿Cómo estructuro un ensayo IB?')">Ensayo</button>
          <button class="qp-btn" onclick="quickPrompt('Command terms del IB')">Command terms</button>
          <button class="qp-btn" onclick="quickPrompt('¿Cómo se calcula el IB score final?')">Puntaje IB</button>
          <button class="qp-btn" onclick="quickPrompt('Tips para el examen de Matemáticas IB')">Mate exam</button>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Welcome message injected by JS -->
        </div>

        <div class="chat-input-area">
          <textarea id="chat-input" placeholder="Pregúntale algo a CTM.ia..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </section>

    </main>
  </div>

  <script>
  // ═══════════════════════════════════════════════
  //  CTM.ia — Motor de respuestas local (sin API)
  // ═══════════════════════════════════════════════

  const KB = {
    tok: `**TOK (Theory of Knowledge)** es una materia obligatoria del IB que te hace cuestionarlo todo 🧠

Los 2 componentes:
• **Ensayo TOK** (67%) — 1600 palabras sobre un *título prescrito*
• **Presentación TOK** (33%) — en grupo, sobre un caso real (*real-life situation*)

Conceptos clave: *Areas of Knowledge* (Ciencias, Historia, Arte...) y *Ways of Knowing* (Razón, Emoción, Lenguaje, Percepción...).

Tip: siempre ancla tus argumentos con *knowledge claims* concretos, no generalices.`,

    ensayo: `**Estructura básica de un ensayo IB:**

1. **Introducción** — Define términos clave, presenta tu argumento central (thesis)
2. **Body paragraph 1** — Claim → Evidence → Explanation → Link back
3. **Body paragraph 2** — Counter-claim o segundo argumento
4. **Body paragraph 3** — Síntesis o tercer ángulo
5. **Conclusión** — Responde directamente al título, no repitas

Recuerda: en IB se valora mucho el *analysis* y la *evaluation*, no solo describir.`,

    commandterms: `**Command Terms más importantes del IB:**

• <code>Analyse</code> — descomponer en partes y explicar relaciones
• <code>Evaluate</code> — dar un juicio basado en evidencia (pros/contras + posición)
• <code>Discuss</code> — múltiples perspectivas con argumentos y contra-argumentos
• <code>Explain</code> — dar razones detalladas del *por qué* o *cómo*
• <code>Compare</code> — similitudes y diferencias
• <code>Justify</code> — dar razones que apoyan una decisión
• <code>Outline</code> — resumen conciso de los puntos principales
• <code>Define</code> — dar el significado preciso

Lee el command term ANTES de responder — define exactamente qué se espera.`,

    puntaje: `**Sistema de puntaje del IB:**

Cada materia: **1–7 puntos**
• 6 materias × 7 = 42 puntos base
• TOK + Extended Essay = hasta **3 puntos extra**
• **Total máximo: 45 puntos**

Para graduarse necesitas mínimo **24 puntos** y cumplir condiciones (no más de 2 en ninguna materia, aprobar EE y TOK).

La mayoría de universidades top piden entre **38–42** para carreras competitivas.`,

    ia_bio: `**Tips para la IA de Biología IB:**

Estructura sugerida:
1. *Research question* clara y medible
2. *Hypothesis* basada en biología real
3. *Variables* (independiente, dependiente, controladas)
4. *Methodology* reproducible — alguien más debe poder repetirlo
5. *Raw data* con incertidumbre y unidades
6. *Processed data* con estadísticas (media, SD, t-test si aplica)
7. *Conclusion & Evaluation* — conecta los resultados con la biología

El criterio más fácil de subir: **Communication** (presentación, gráficos, formato). El más difícil: **Analysis**.`,

    mate_tips: `**Tips para el examen de Matemáticas IB:**

**Paper 1** (sin calculadora):
• Practica cálculos mentales y fracciones exactas
• Domina derivadas e integrales básicas de memoria

**Paper 2** (con calculadora — Classpad/GDC):
• Conoce tu calculadora: solver, graph, statistics
• Muestra el *método* aunque tengas la respuesta de la calcu

Estrategia general:
• Lee TODOS los ejercicios primero, empieza por los que conoces
• En el IB, *method marks* existen — muestra tu trabajo
• Nunca dejes en blanco: una respuesta parcial da puntos`,

    ia_general: `**La IA (Internal Assessment)** es un trabajo individual de investigación que vale ~20% de tu nota final.

Por materia:
• **Bio/Quím/Físic** — investigación experimental (10–12 páginas)
• **Matemáticas** — exploración de un tema matemático (12–20 páginas)
• **Historia** — Historical investigation (2200 palabras)
• **Inglés/Español** — Individual oral (Lit) o Written assignment

Tip universal: elige un tema que genuinamente te interese — pasarás meses en él. Y empieza con el *Research Question* bien definido.`,

    bio: `**Biología IB — Temas clave:**

**HL/SL comunes:**
• Bioquímica (carbohidratos, proteínas, enzimas, DNA/RNA)
• Biología celular (membrana, organelos, mitosis, meiosis)
• Genética (Mendel, ligamiento, mutaciones)
• Ecología (ciclos, cadenas tróficas, biodiversidad)
• Evolución y cladística

**Solo HL:**
• Metabolismo (glucólisis, Krebs, cadena respiratoria)
• Inmunología detallada
• Neurobiología

Para practicar: **Biology for Life** (ya lo tienes en el toolkit) tiene resúmenes por tema y preguntas pasadas.`,

    mate: `**Matemáticas IB:**

**AA (Analysis and Approaches)** — más álgebra, cálculo puro, pruebas formales
**AI (Applications and Interpretation)** — más estadística, modelado, aplicaciones reales

Temas comunes (ambas):
• Álgebra y funciones
• Trigonometría
• Estadística y probabilidad
• Cálculo (derivadas, integrales)

Usa **Classpad** (en tu toolkit) para la calculadora GDC online — es equivalente a la física en el examen.`,

    ee: `**Extended Essay (EE):**

• 4000 palabras de investigación independiente
• Cualquier materia del IB (o World Studies)
• Evaluado externamente por el IBO
• Junto con TOK da hasta **3 puntos extra**

Proceso:
1. Elige materia y supervisor
2. Formula un *Research Question* específico
3. Draft → feedback → revisión → entrega

Empieza TEMPRANO (Year 1 si puedes). Un buen EE + TOK = 3 puntos que pueden subir tu nota final significativamente.`,

    default_responses: [
      `Buena pregunta. Para darte una respuesta más precisa necesito saber más contexto — ¿de qué materia o tema del IB es?`,
      `Eso está fuera de mi base de conocimiento directa, pero puedo ayudarte a estructurarlo. ¿Me das más detalles?`,
      `Para eso te recomendaría combinar lo que tienes en el **Toolkit** (index.html) con los recursos oficiales del IBO. ¿Quieres que te explique algún concepto específico?`,
      `Interesante. En el contexto del IB, eso generalmente se relaciona con los *command terms* de evaluación. ¿Quieres que lo exploremos?`,
      `No tengo datos específicos sobre eso, pero puedo ayudarte con la estructura de respuesta para el examen. ¿De qué materia estamos hablando?`,
    ]
  };

  // ── Match keywords ────────────────────────────
  function getResponse(input) {
    const t = input.toLowerCase();

    if (/tok|theory of knowledge|conocimiento/.test(t)) return KB.tok;
    if (/ensayo|essay|estructura|introducción|conclusion/.test(t)) return KB.ensayo;
    if (/command term|analyse|evaluate|discuss|justify|outline|define/.test(t)) return KB.commandterms;
    if (/puntaje|score|puntos|45|graduarse|diploma/.test(t)) return KB.puntaje;
    if (/ia.*bio|bio.*ia|internal.*bio|biolog.*investig/.test(t)) return KB.ia_bio;
    if (/mate.*exam|examen.*mate|paper|calculadora|classpad/.test(t)) return KB.mate_tips;
    if (/\bia\b|internal assessment|investigación interna/.test(t)) return KB.ia_general;
    if (/biolog/.test(t)) return KB.bio;
    if (/matemat|math|algebra|calculo|calculus|estadistic/.test(t)) return KB.mate;
    if (/ee|extended essay/.test(t)) return KB.ee;
    if (/hola|buenas|hey|ola/.test(t)) return `¡Hey! Soy **CTM.ia**, tu asistente de estudio IB \n\nPuedo ayudarte con:\n• TOK y EE\n• Estructura de ensayos\n• Command terms\n• Consejos por materia\n• Sistema de puntaje IB\n\n¿En qué empezamos?`;
    if (/gracias/.test(t)) return `De nada — si necesitas más, aquí estoy.`;
    if (/quien eres|que eres|que puedes|para que sirves/.test(t)) return `Soy **CTM.ia**, una IA de estudio construida para el IB sin depender de ninguna API externa 🧠\n\nTengo conocimiento sobre: TOK, EE, IA (Internal Assessment), command terms, Biología, Matemáticas, estructuras de ensayo, y el sistema de puntaje del IB.\n\nTodo corre en tu navegador, sin internet adicional.`;

    // Si nada matchea — respuesta genérica variada
    return KB.default_responses[Math.floor(Math.random() * KB.default_responses.length)];
  }

  // ── Renderizar markdown simple ─────────────────
  function renderMD(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\n•/g, '<br/>•')
      .replace(/\n/g, '<br/>');
  }

  // ── Chat ───────────────────────────────────────
  const msgs = document.getElementById('chat-messages');
  let isTyping = false;

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    const avatar = role === 'ia' ? 'IA' : 'Tú';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-bubble">${role === 'ia' ? renderMD(text) : text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg msg-ia'; div.id = 'typing-msg';
    div.innerHTML = `<div class="msg-avatar">IA</div>
      <div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  function sendMessage() {
    if (isTyping) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    document.getElementById('send-btn').disabled = true;
    isTyping = true;

    // Ocultar quick prompts tras primer mensaje
    document.getElementById('quick-prompts').style.display = 'none';

    showTyping();
    const delay = 600 + Math.random() * 800;
    setTimeout(() => {
      removeTyping();
      addMessage('ia', getResponse(text));
      isTyping = false;
      document.getElementById('send-btn').disabled = false;
    }, delay);
  }

  function quickPrompt(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  function clearChat() {
    msgs.innerHTML = '';
    document.getElementById('quick-prompts').style.display = 'flex';
    addMessage('ia', '¡Chat limpio más qeu tu! ¿En qué te ayudo?');
  }

  // ── Notas ─────────────────────────────────────
  const NOTES_KEY = 'ctm_notes';
  let notes = [], activeNoteId = null;

  function loadNotes() {
    try { notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); }
    catch { notes = []; }
    renderNotesList();
  }

  function saveNotesToStorage() {
    localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
  }

  function renderNotesList() {
    const list = document.getElementById('notes-list');
    if (!notes.length) {
      list.innerHTML = '<p class="note-empty">Crea tu primera nota<br/>con "+ Nueva"</p>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="note-item ${n.id === activeNoteId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${n.title || 'Sin título'}</div>
        <div class="note-item-date">${new Date(n.updatedAt).toLocaleDateString('es-PE')}</div>
      </div>`).join('');
  }

  function newNote() {
    const n = { id: 'n' + Date.now(), title: '', content: '', updatedAt: Date.now() };
    notes.unshift(n);
    saveNotesToStorage();
    openNote(n.id);
  }

  function openNote(id) {
    activeNoteId = id;
    const n = notes.find(x => x.id === id);
    if (!n) return;
    document.getElementById('note-title').value   = n.title;
    document.getElementById('note-content').value = n.content;
    renderNotesList();
  }

  function saveNote() {
    if (!activeNoteId) { newNote(); return; }
    const n = notes.find(x => x.id === activeNoteId);
    if (!n) return;
    n.title     = document.getElementById('note-title').value || 'Sin título';
    n.content   = document.getElementById('note-content').value;
    n.updatedAt = Date.now();
    saveNotesToStorage();
    renderNotesList();
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ Guardado'; btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Guardar'; btn.classList.remove('saved'); }, 1500);
  }

  function deleteNote() {
    if (!activeNoteId) return;
    if (!confirm('¿Eliminar esta nota?')) return;
    notes = notes.filter(x => x.id !== activeNoteId);
    activeNoteId = null;
    saveNotesToStorage();
    document.getElementById('note-title').value   = '';
    document.getElementById('note-content').value = '';
    renderNotesList();
  }

  function insertTag(tag) {
    const ta = document.getElementById('note-content');
    const pos = ta.selectionStart;
    const val = ta.value;
    ta.value = val.slice(0, pos) + '\n── ' + tag + ' ──\n' + val.slice(pos);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = pos + tag.length + 8;
  }

  function askIaAboutNote() {
    const title   = document.getElementById('note-title').value;
    const content = document.getElementById('note-content').value.slice(0, 300);
    if (!content.trim()) {
      addMessage('ia', 'La nota está vacía. Escribe algo primero y vuelvo a explicarlo ');
      return;
    }
    const prompt = `Explica o resume esto de mis notas: "${title}" — ${content}...`;
    document.getElementById('chat-input').value = prompt;
    sendMessage();
  }

  // ── Inicializar ─────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadNotes();
    addMessage('ia', `¡Bienvenido a **CTM.ia** \n\nSoy tu asistente de estudio IB o intento.\n\nA la izquierda tienes tu **notebook** para apuntes. Aquí en el chat puedo explicarte temas, darte tips y analizar tus notas.\n\n¿Qué estudias hoy?`);
  });

  // Auto-save on title change
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('note-title').addEventListener('blur', saveNote);
  });
  </script>
</body>
</html>
